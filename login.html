<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sign in — Ledger</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500;600&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
:root{
  --navy:#050d1a;--deep:#0a1628;--card:#0f1e35;
  --border:rgba(16,185,129,.15);--electric:#10b981;
  --white:#f4f7ff;--off:#a8b8d0;--muted:#6b7a93;--danger:#ef4444;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{
  background:var(--navy);color:var(--white);font-family:'DM Sans',sans-serif;
  min-height:100vh;display:flex;flex-direction:column;align-items:center;
  justify-content:center;padding:1.5rem;
}
body::before{
  content:'';position:fixed;inset:0;z-index:0;pointer-events:none;
  background-image:linear-gradient(rgba(16,185,129,.04) 1px,transparent 1px),
    linear-gradient(90deg,rgba(16,185,129,.04) 1px,transparent 1px);
  background-size:60px 60px;
}
.container{position:relative;z-index:1;width:100%;max-width:420px}
.logo{
  font-family:'Bebas Neue',sans-serif;font-size:1.8rem;letter-spacing:.08em;
  color:var(--electric);text-align:center;margin-bottom:2rem;
  display:block;text-decoration:none;
}
.card{
  background:var(--deep);border:1px solid var(--border);border-radius:14px;
  padding:2rem;position:relative;overflow:hidden;
}
.card::before{
  content:'';position:absolute;top:0;left:0;right:0;height:2px;
  background:linear-gradient(90deg,transparent,var(--electric),transparent);
}
.tabs{display:flex;border-bottom:1px solid var(--border);margin-bottom:1.75rem}
.tab-btn{
  flex:1;background:none;border:none;color:var(--muted);cursor:pointer;
  font-family:'DM Sans',sans-serif;font-size:.95rem;font-weight:500;
  padding:.75rem;border-bottom:2px solid transparent;margin-bottom:-1px;
  transition:color .2s,border-color .2s;
}
.tab-btn.active{color:var(--electric);border-bottom-color:var(--electric)}
.form-group{margin-bottom:1.1rem}
label{display:block;font-size:.82rem;font-weight:500;color:var(--off);margin-bottom:.4rem}
input{
  width:100%;background:var(--card);border:1px solid var(--border);border-radius:8px;
  padding:.7rem .9rem;color:var(--white);font-family:'DM Sans',sans-serif;font-size:.95rem;
  outline:none;transition:border-color .2s;
}
input:focus{border-color:var(--electric)}
input::placeholder{color:var(--muted)}
.btn{
  width:100%;background:var(--electric);color:var(--navy);border:none;border-radius:8px;
  font-family:'Bebas Neue',sans-serif;letter-spacing:.07em;font-size:1.05rem;
  padding:.75rem;cursor:pointer;transition:opacity .2s;margin-top:.5rem;
}
.btn:hover{opacity:.85}
.btn:disabled{opacity:.5;cursor:not-allowed}
.divider{
  display:flex;align-items:center;gap:.75rem;margin:1.25rem 0;
  font-size:.8rem;color:var(--muted);
}
.divider::before,.divider::after{content:'';flex:1;height:1px;background:var(--border)}
.btn-google{
  width:100%;background:var(--card);color:var(--white);
  border:1px solid var(--border);border-radius:8px;
  font-family:'DM Sans',sans-serif;font-size:.95rem;font-weight:500;
  padding:.7rem;cursor:pointer;transition:border-color .2s;
  display:flex;align-items:center;justify-content:center;gap:.6rem;
}
.btn-google:hover{border-color:rgba(255,255,255,.3)}
.btn-google svg{width:18px;height:18px;flex-shrink:0}
.msg{
  font-size:.85rem;padding:.65rem .9rem;border-radius:7px;margin-top:1rem;display:none;
}
.msg.error{background:rgba(239,68,68,.1);border:1px solid rgba(239,68,68,.3);color:#fca5a5}
.msg.success{background:rgba(16,185,129,.1);border:1px solid rgba(16,185,129,.3);color:#6ee7b7}
.msg.show{display:block}
.back-link{
  display:block;text-align:center;margin-top:1.5rem;
  font-size:.85rem;color:var(--muted);text-decoration:none;
}
.back-link:hover{color:var(--off)}
#field-name{display:none}
</style>
</head>
<body>

<div class="container">
  <a href="index.html" class="logo">Ledger</a>
  <div class="card">
    <div class="tabs">
      <button class="tab-btn active" id="tab-signin">Sign in</button>
      <button class="tab-btn"        id="tab-signup">Create account</button>
    </div>

    <button class="btn-google" id="btn-google" type="button">
      <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
        <path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/>
        <path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/>
        <path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/>
        <path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/>
      </svg>
      Continue with Google
    </button>

    <div class="divider">or</div>

    <div id="field-name" class="form-group">
      <label for="fullName">Full name</label>
      <input type="text" id="fullName" placeholder="Your name" autocomplete="name">
    </div>
    <div class="form-group">
      <label for="email">Email address</label>
      <input type="email" id="email" placeholder="you@example.com" autocomplete="email">
    </div>
    <div class="form-group">
      <label for="password">Password</label>
      <input type="password" id="password" placeholder="••••••••" autocomplete="current-password">
    </div>

    <button class="btn" id="btn-submit" type="button">Sign in</button>
    <div class="msg" id="msg"></div>
  </div>
  <a href="index.html" class="back-link">← Back to home</a>
</div>

<!-- Load Supabase THEN run our code -->
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="config.js"></script>
<script>
(function () {
  'use strict';

  // ── Defensive init ──────────────────────────────────────────────
  let sb;
  try {
    if (typeof window.supabase === 'undefined') throw new Error('Supabase library failed to load. Check your internet connection.');
    if (typeof window.LDG === 'undefined')      throw new Error('config.js failed to load.');
    sb = window.supabase.createClient(window.LDG.SUPABASE_URL, window.LDG.SUPABASE_KEY);
  } catch (err) {
    document.getElementById('msg').textContent = err.message;
    document.getElementById('msg').className = 'msg error show';
    console.error('Init error:', err);
    // buttons stay in DOM but will show msg if clicked
  }

  let mode = 'signin';

  // ── Tab switching ───────────────────────────────────────────────
  function switchTab(tab) {
    mode = tab;
    document.getElementById('tab-signin').classList.toggle('active', tab === 'signin');
    document.getElementById('tab-signup').classList.toggle('active', tab === 'signup');
    document.getElementById('btn-submit').textContent = tab === 'signin' ? 'Sign in' : 'Create account';
    document.getElementById('field-name').style.display  = tab === 'signup' ? 'block' : 'none';
    document.getElementById('password').autocomplete     = tab === 'signup' ? 'new-password' : 'current-password';
    clearMsg();
  }

  document.getElementById('tab-signin').addEventListener('click', () => switchTab('signin'));
  document.getElementById('tab-signup').addEventListener('click', () => switchTab('signup'));

  // ── Submit (sign in / sign up) ──────────────────────────────────
  document.getElementById('btn-submit').addEventListener('click', handleSubmit);
  document.getElementById('password').addEventListener('keydown', e => {
    if (e.key === 'Enter') handleSubmit();
  });

  async function handleSubmit() {
    if (!sb) { showMsg('App failed to initialise. Reload the page.', 'error'); return; }

    const email    = document.getElementById('email').value.trim();
    const password = document.getElementById('password').value;
    const btn      = document.getElementById('btn-submit');

    if (!email)            { showMsg('Enter your email address.', 'error'); return; }
    if (!password)         { showMsg('Enter your password.', 'error'); return; }
    if (password.length < 6) { showMsg('Password must be at least 6 characters.', 'error'); return; }

    btn.disabled = true;
    btn.textContent = 'Please wait…';

    try {
      if (mode === 'signup') {
        const fullName = document.getElementById('fullName').value.trim();
        if (!fullName) {
          showMsg('Enter your full name.', 'error');
          btn.disabled = false; btn.textContent = 'Create account';
          return;
        }
        const { error } = await sb.auth.signUp({
          email, password,
          options: {
            data: { full_name: fullName },
            emailRedirectTo: window.LDG.SITE_URL + '/confirm.html'
          }
        });
        if (error) throw error;
        showMsg('Account created! Check your email for a verification link.', 'success');
        btn.textContent = 'Email sent ✓';

      } else {
        const { error } = await sb.auth.signInWithPassword({ email, password });
        if (error) throw error;
        window.location.href = 'account.html';
      }
    } catch (err) {
      showMsg(err.message || 'Something went wrong. Try again.', 'error');
      btn.disabled = false;
      btn.textContent = mode === 'signup' ? 'Create account' : 'Sign in';
    }
  }

  // ── Google OAuth ────────────────────────────────────────────────
  document.getElementById('btn-google').addEventListener('click', async () => {
    if (!sb) { showMsg('App failed to initialise. Reload the page.', 'error'); return; }
    try {
      const { error } = await sb.auth.signInWithOAuth({
        provider: 'google',
        options: { redirectTo: window.LDG.SITE_URL + '/confirm.html' }
      });
      if (error) {
        if (error.message.toLowerCase().includes('provider') || error.status === 422) {
          showMsg('Google sign-in is not yet enabled. Use email and password above.', 'error');
        } else {
          throw error;
        }
      }
    } catch (err) {
      showMsg(err.message || 'Google sign-in failed. Try again.', 'error');
    }
  });

  // ── Helpers ─────────────────────────────────────────────────────
  function showMsg(text, type) {
    const el = document.getElementById('msg');
    el.textContent = text;
    el.className = 'msg ' + type + ' show';
  }
  function clearMsg() {
    const el = document.getElementById('msg');
    el.className = 'msg';
    el.textContent = '';
  }

  // ── Auto-redirect if already signed in ─────────────────────────
  async function checkSession() {
    if (!sb) return;
    try {
      const { data: { session } } = await sb.auth.getSession();
      if (session) window.location.href = 'account.html';
    } catch (_) {}

    const params = new URLSearchParams(window.location.search);
    if (params.get('mode') === 'signup') switchTab('signup');
  }

  checkSession();
})();
</script>
</body>
</html>
